<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iceland Trip Itinerary</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }
        
        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }
        
        header p {
            font-size: 1.1em;
            opacity: 0.9;
            margin-bottom: 5px;
        }
        
        .tab-navigation {
            display: flex;
            background-color: #f8f9fa;
            border-bottom: 2px solid #e0e0e0;
            flex-wrap: wrap;
            padding: 0;
            margin: 0;
        }
        
        .tab-button {
            flex: 1;
            min-width: 120px;
            padding: 20px;
            border: none;
            background: none;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            color: #555;
            transition: all 0.3s ease;
            border-bottom: 4px solid transparent;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .tab-button:hover {
            background-color: #f0f0f0;
            color: #667eea;
        }
        
        .tab-button.active {
            color: #667eea;
            border-bottom-color: #667eea;
            background-color: white;
        }
        
        .tab-content {
            display: none;
            width: 100%;
            height: 700px;
            overflow: hidden;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .tab-content iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .content-info {
            padding: 20px;
            background-color: white;
        }
        
        footer {
            background-color: #f8f9fa;
            padding: 20px;
            text-align: center;
            color: #666;
            font-size: 0.9em;
            border-top: 1px solid #e0e0e0;
        }
        
        .status-badge {
            display: inline-block;
            background-color: #ffc107;
            color: #333;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75em;
            font-weight: bold;
            margin-left: 10px;
            vertical-align: middle;
        }
        
        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8em;
            }
            
            .tab-button {
                min-width: 80px;
                padding: 15px;
                font-size: 0.9em;
            }
            
            .tab-content {
                height: 500px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏔️ Iceland Adventure</h1>
            <p>Complete Trip Itinerary with Interactive Maps</p>
        </header>
        
        <div class="tab-navigation">
            <button class="tab-button active" onclick="openTab(event, 'day1')">
                Day 1
            </button>
            <button class="tab-button" onclick="openTab(event, 'day2')">
                Day 2 <span class="status-badge" style="display: inline; margin-left: 5px;">Draft</span>
            </button>
            <button class="tab-button" onclick="openTab(event, 'day3')">
                Day 3 <span class="status-badge" style="display: inline; margin-left: 5px;">Draft</span>
            </button>
            <button class="tab-button" onclick="openTab(event, 'day4')">
                Day 4 <span class="status-badge" style="display: inline; margin-left: 5px;">Draft</span>
            </button>
            <button class="tab-button" onclick="openTab(event, 'day5')">
                Day 5 <span class="status-badge" style="display: inline; margin-left: 5px;">Draft</span>
            </button>
        </div>
        
        <!-- Day 1 -->
        <div id="day1" class="tab-content active">
            <iframe src="day1.html" title="Day 1 Map"></iframe>
        </div>
        
        <!-- Day 2 -->
        <div id="day2" class="tab-content">
            <iframe src="day2.html" title="Day 2 Map"></iframe>
        </div>
        
        <!-- Day 3 -->
        <div id="day3" class="tab-content">
            <iframe src="day3.html" title="Day 3 Map"></iframe>
        </div>
        
        <!-- Day 4 -->
        <div id="day4" class="tab-content">
            <iframe src="day4.html" title="Day 4 Map"></iframe>
        </div>
        
        <!-- Day 5 -->
        <div id="day5" class="tab-content">
            <iframe src="day5.html" title="Day 5 Map"></iframe>
        </div>
        
        <footer>
            <p>📍 Interactive maps powered by Google Maps | Plan your Iceland adventure!</p>
        </footer>
    </div>
    
    <script>
        function openTab(evt, tabName) {
            // Hide all tab contents
            const tabContents = document.querySelectorAll('.tab-content');
            tabContents.forEach(tab => {
                tab.classList.remove('active');
            });
            
            // Remove active class from all buttons
            const tabButtons = document.querySelectorAll('.tab-button');
            tabButtons.forEach(button => {
                button.classList.remove('active');
            });
            
            // Show the current tab and mark button as active
            document.getElementById(tabName).classList.add('active');
            evt.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
