<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iceland Trip - Day 2</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        h1 {
            color: #333;
            text-align: center;
        }
        .duration {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .status-badge {
            display: inline-block;
            background-color: #ffc107;
            color: #333;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-left: 10px;
        }
        #map {
            width: 100%;
            height: 600px;
            margin: 20px 0;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .info {
            background-color: white;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }
        .map-link {
            display: inline-block;
            margin-top: 10px;
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }
        .map-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>Day 2 - Iceland Itinerary <span class="status-badge">DRAFT</span></h1>
    <div class="duration">Duration: 7h53</div>
    
    <div id="map"></div>
    
    <div class="info">
        <p><strong>Route:</strong> Ravencliff Lodge → Foss → Goðafoss Waterfall</p>
        <a href="https://www.google.com/maps/dir/Ravencliff+Lodge,+Hordudalsvegur+eystri+Fremri-Hrafnabj%C3%B6rg,+371+Dalabygg%C3%B0,+Iceland/Foss,+Hallandsnes,+606,+Iceland/Go%C3%B0afoss" class="map-link" target="_blank">View full route on Google Maps →</a>
        <p><a href="javascript:history.back()">← Back</a></p>
    </div>
    
    <script>
        const map = L.map('map').setView([65.4, -16.3], 8);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
            maxZoom: 19
        }).addTo(map);
        
        const waypoints = [
            {lat: 65.4, lng: -15.8, label: 'Ravencliff Lodge'},
            {lat: 65.78, lng: -16.92, label: 'Foss'},
            {lat: 65.68, lng: -16.81, label: 'Goðafoss'}
        ];
        
        waypoints.forEach((wp, idx) => {
            L.circleMarker([wp.lat, wp.lng], {
                radius: 10,
                fillColor: '#667eea',
                color: '#fff',
                weight: 2,
                opacity: 1,
                fillOpacity: 0.8
            }).addTo(map).bindPopup(`<strong>${idx + 1}. ${wp.label}</strong>`);
        });
        
        const routeCoordinates = waypoints.map(wp => [wp.lat, wp.lng]);
        L.polyline(routeCoordinates, {color: '#667eea', weight: 3, opacity: 0.7}).addTo(map);
    </script>
</body>
</html>
