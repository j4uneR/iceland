<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iceland Trip - Day 4</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        h1 {
            color: #333;
            text-align: center;
        }
        .duration {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .status-badge {
            display: inline-block;
            background-color: #ffc107;
            color: #333;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-left: 10px;
        }
        #map {
            width: 100%;
            height: 600px;
            margin: 20px 0;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .info {
            background-color: white;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }
        .version-note {
            background-color: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 10px;
            margin: 20px 0;
            border-radius: 4px;
        }
        .map-link {
            display: inline-block;
            margin-top: 10px;
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }
        .map-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>Day 4 - Iceland Itinerary <span class="status-badge">DRAFT</span></h1>
    <div class="duration">Duration: 4h13</div>
    
    <div class="version-note">
        <strong>Note:</strong> This is the draft version (4h13). A TODO version (7h17) is also available with additional stops.
    </div>
    
    <div id="map"></div>
    
    <div class="info">
        <p><strong>Route:</strong> Stokksnes → Diamond Beach → Mulagljúfur Canyon → Fjáðrárglúfur</p>
        <a href="https://www.google.com/maps/dir/Stokksnes,+Stokksnesvegur+9720,+Iceland/Diamond+Beach,+781,+Iceland/Mulagljufur+Canyon,+XGQP%2BJCH,+785,+Iceland/Fja%C3%B0r%C3%A1rglj%C3%BAfur,+881" class="map-link" target="_blank">View full route on Google Maps →</a>
        <p><a href="javascript:history.back()">← Back</a></p>
    </div>
    
    <script>
        const map = L.map('map').setView([63.87, -18.4], 8);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
            maxZoom: 19
        }).addTo(map);
        
        const waypoints = [
            {lat: 63.869, lng: -18.404, label: 'Stokksnes'},
            {lat: 64.126, lng: -17.485, label: 'Diamond Beach'},
            {lat: 63.76, lng: -18.88, label: 'Mulagljúfur Canyon'},
            {lat: 63.876, lng: -18.712, label: 'Fjáðrárglúfur'}
        ];
        
        waypoints.forEach((wp, idx) => {
            L.circleMarker([wp.lat, wp.lng], {
                radius: 10,
                fillColor: '#667eea',
                color: '#fff',
                weight: 2,
                opacity: 1,
                fillOpacity: 0.8
            }).addTo(map).bindPopup(`<strong>${idx + 1}. ${wp.label}</strong>`);
        });
        
        const routeCoordinates = waypoints.map(wp => [wp.lat, wp.lng]);
        L.polyline(routeCoordinates, {color: '#667eea', weight: 3, opacity: 0.7}).addTo(map);
    </script>
</body>
</html>
