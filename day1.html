<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iceland Trip - Day 1</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        h1 {
            color: #333;
            text-align: center;
        }
        .duration {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }
        #map {
            width: 100%;
            height: 600px;
            margin: 20px 0;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .info {
            background-color: white;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }
        .map-link {
            display: inline-block;
            margin-top: 10px;
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }
        .map-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>Day 1 - Iceland Itinerary</h1>
    <div class="duration">Duration: 5h54</div>
    
    <div id="map"></div>
    
    <div class="info">
        <p><strong>Route:</strong> Keflavík International Airport → Costco Wholesale Iceland → Landbrota</p>
        <a href="https://www.google.com/maps/dir/Keflavik+International+Airport,+235+Keflavik,+Iceland/Costco+Wholesale+Iceland,+Kauptan+3,+210+Gardabaer,+Iceland/Landbrota" class="map-link" target="_blank">View full route on Google Maps →</a>
        <p><a href="javascript:history.back()">← Back</a></p>
    </div>
    
    <script>
        const map = L.map('map').setView([63.985, -22.044], 8);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
            maxZoom: 19
        }).addTo(map);
        
        const waypoints = [
            {lat: 63.985, lng: -22.044, label: 'Keflavik Airport'},
            {lat: 64.084, lng: -21.895, label: 'Costco Wholesale'},
            {lat: 64.123, lng: -21.567, label: 'Landbrota'}
        ];
        
        waypoints.forEach((wp, idx) => {
            L.circleMarker([wp.lat, wp.lng], {
                radius: 10,
                fillColor: '#667eea',
                color: '#fff',
                weight: 2,
                opacity: 1,
                fillOpacity: 0.8
            }).addTo(map).bindPopup(`<strong>${idx + 1}. ${wp.label}</strong>`);
        });
        
        const routeCoordinates = waypoints.map(wp => [wp.lat, wp.lng]);
        L.polyline(routeCoordinates, {color: '#667eea', weight: 3, opacity: 0.7}).addTo(map);
    </script>
</body>
</html>
