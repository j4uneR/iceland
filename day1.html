<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iceland Trip - Day 1</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        h1 {
            color: #333;
            text-align: center;
        }
        .duration {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }
        #map {
            width: 100%;
            height: 600px;
            margin: 20px 0;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .info {
            background-color: white;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }
        .map-link {
            display: inline-block;
            margin-top: 10px;
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }
        .map-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>Day 1 - Iceland Itinerary</h1>
    <div class="duration">Duration: 5h54</div>
    
    <div id="map"></div>
    
    <div class="info">
        <p><strong>Route:</strong> Keflavík International Airport → Costco Wholesale Iceland → Landbrota</p>
        <a href="https://www.google.com/maps/dir/Keflav%C3%ADk+International+Airport,+235+Keflav%C3%ADk,+Iceland/Costco+Wholesale+Iceland,+Kaupt%C3%BAn+3,+210+Gar%C3%B0ab%C3%A6r,+Iceland/Landbrotalaug+Hot+Springs,+RMJM%2BRJG,+Unnamed+Road,+311+Raudhamelur,+Iceland/Arnarstapi+Trailhead+Parking,+Arnarstapavegur+356,+356+Arnarstapi,+Iceland/Saxh%C3%B3ll+Crater,+V32G%2B95F,+356+Hellissandur,+Iceland/Kirkjufellsfoss,+WMGQ%2BFFJ,+351+Grundarfj%C3%B6r%C3%B0ur,+Iceland/Kolgrafarfj%C3%B6r%C3%B0ur,+XV8G%2B96Q,+351+Bjarnarh%C3%B6fn,+Iceland/Ravencliff+Lodge,+H%C3%B6r%C3%B0udalsvegur+eystri+Fremri-Hrafnabj%C3%B6rg,+371+Dalabygg%C3%B0,+Iceland/@64.8558311,-21.4430667,7.75z/data=!4m50!4m49!1m5!1m1!1s0x4929fdfce2ab799f:0x27f88d0a15c328cd!2m2!1d-22.6281862!2d63.9814869!1m5!1m1!1s0x48d60ce62fda2ba1:0x11fbf09ec10531a8!2m2!1d-21.9119723!2d64.0735057!1m5!1m1!1s0x48d5a5fa991c439b:0x2ebad2086e263c32!2m2!1d-22.3159128!2d64.8320659!1m5!1m1!1s0x492a81000ceb49eb:0x2e1c549ba9661a94!2m2!1d-23.6209673!2d64.7699757!1m5!1m1!1s0x492a856d6d692567:0xaed98fa235ca21bb!2m2!1d-23.924576!2d64.850947!1m5!1m1!1s0x48d57bb2877d00d3:0x263186a28a338d0!2m2!1d-23.3113649!2d64.9262179!1m5!1m1!1s0x48d57101c02d82c7:0xb99315d315935040!2m2!1d-23.1244029!2d64.9659645!1m5!1m1!1s0x48d4574d68e89e5f:0xe47864998d231f11!2m2!1d-21.7407938!2d64.9784439!3e0?entry=ttu&g_ep=EgoyMDI2MDcyMC4wIKXMDSoASAFQAw%3D%3D">View full route on Google Maps →</a>
        <p><a href="javascript:history.back()">← Back</a></p>
    </div>
    
    <script>
        const map = L.map('map').setView([63.985, -22.044], 8);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
            maxZoom: 19
        }).addTo(map);
        
        const waypoints = [
            {lat: 63.985, lng: -22.044, label: 'Keflavik Airport'},
            {lat: 64.084, lng: -21.895, label: 'Costco Wholesale'},
            {lat: 64.123, lng: -21.567, label: 'Landbrota'}
        ];
        
        waypoints.forEach((wp, idx) => {
            L.circleMarker([wp.lat, wp.lng], {
                radius: 10,
                fillColor: '#667eea',
                color: '#fff',
                weight: 2,
                opacity: 1,
                fillOpacity: 0.8
            }).addTo(map).bindPopup(`<strong>${idx + 1}. ${wp.label}</strong>`);
        });
        
        const routeCoordinates = waypoints.map(wp => [wp.lat, wp.lng]);
        L.polyline(routeCoordinates, {color: '#667eea', weight: 3, opacity: 0.7}).addTo(map);
    </script>
</body>
</html>
